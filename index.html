<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecalling Entry</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<form name="Call Response"  autocomplete="off">
        <input type="tel" id="phone" name="phone" placeholder="Phone Number" pattern="[0-9]{10}" required><br>
		
		<select id="callConnection" name="callConnection" required>
			<option value="" disabled selected>Call Result</option>
			<option value="connected">Call Connected</option>
			<option value="not connected">Call is Not Connected</option>
		</select><br>
        
		<select id="reasonNotConnected" name="reasonNotConnected" style="display: none">
			<option value="" disabled selected>Reason of not connection</option>
			<option value="switch off">Switch Off</option>
			<option value="out of service">Out of Service</option>
			<option value="invalid">Invalid Number</option>
			<option value="no incoming">No Incoming</option>
			<option value="no network">No Network</option>
			<option value="transferred to voice mail">Transferred to Voice Mail</option>
			<option value="ring and busy">Ring and Busy</option>
			<option value="no response">No Response</option>
			<option value="other">Other</option>
		</select><br>
		
		<select id="connectedResponse" name="connectedResponse"  style="display: none">
			<option value="" disabled selected>Customer Response</option>
			<option value="interested">Customer is Interested</option>
			<option value="not interested">Customer is Not Interested</option>
			<option value="busy">Customer is Busy</option>
			<option value="details shared">Details Shared</option>
		</select><br>
		
		<select id="nextCall" name="nextCall"  style="display: none">
			<option value="" disabled selected>Next Follow Up</option>
			<option value="appointment">Appointment Fixed: </option>
			<option value="followUp">Next Call: </option>
		</select><input type="date" id="nextDate" name="nextDate"  style="display: none"><br>
		
		<select id="notInterested" name="notInterested"  style="display: none">
			<option value="" disabled selected>Reason of not Interested</option>
			<option value="already purchased somewhere">Already Purchased Somewhere</option>
			<option value="requirement not matched">Requirement Not Matched</option>
			<option value="low budget">Low Budget</option>
			<option value="other">Other</option>
		</select><br>
		
		<fieldset id="requirement" style="display: none">
			<legend>Customer Requirements</legend>
			<input type="text" name="location" placeholder="Preferred Location">
			<input type="text" name="budget" placeholder="Budget In Lakh""><br>
			<select id="propertyType" name="propertyType">
				<option value="" disabled selected>Property Type</option>
				<option value="1bhk">1 BHK</option>
				<option value="2bhk">2 BHK</option>
				<option value="3bhk">3 BHK</option>
				<option value="4bhk">4 BHK</option>
				<option value="5bhk">5 BHK</option>
				<option value="duplex">Duplex</option>
				<option value="villa">Villa</option>
				<option value="penthouse">Penthouse</option>
				<option value="land">Land</option>
				<option value="other">Other</option>
			</select><br>
			<select id="propertyAge" name="propertyAge">
				<option value="" disabled selected>Property Age</option>
				<option value="rtm">Ready To Move</option>
				<option value="uConstruct">Under Construction</option>
				<option value="resale">Resale</option>
			</select><br>
		</fieldset>
		<textarea id="remarks" name="remarks" rows="10" cols="30" placeholder="Remarks"  style="display: none"></textarea><br>
		<input type="submit" value="Submit">
    </form>
	<script src="script.js"></script>
</body>
</html>
